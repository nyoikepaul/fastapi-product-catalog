<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Catalog • Expert</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-950 text-white">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-80 bg-gray-900 p-8 border-r border-gray-800">
      <h1 class="text-3xl font-bold mb-12 flex items-center gap-3"><i class="fa-solid fa-boxes text-emerald-500"></i> Catalog</h1>
      <input id="apiKey" type="password" class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 mb-6 text-sm" placeholder="Your X-API-Key">
      <button onclick="loadProducts()" class="w-full bg-emerald-600 py-4 rounded-2xl font-semibold">🔄 Refresh Products</button>
    </div>

    <!-- Main -->
    <div class="flex-1 flex flex-col">
      <div class="bg-gray-900 px-10 py-6 flex justify-between items-center border-b border-gray-800">
        <h2 class="text-2xl font-semibold">Products</h2>
        <button onclick="showCreateModal()" class="bg-emerald-500 hover:bg-emerald-600 px-8 py-4 rounded-2xl flex items-center gap-2 font-medium"><i class="fa-solid fa-plus"></i> New Product</button>
      </div>
      <div id="productsGrid" class="flex-1 p-10 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 overflow-auto"></div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">
    <div class="bg-gray-900 rounded-3xl w-full max-w-lg p-8">
      <h3 id="modalTitle" class="text-2xl font-bold mb-6">New Product</h3>
      <form id="productForm" onsubmit="saveProduct(event)">
        <input id="productId" type="hidden">
        <input id="name" required class="w-full mb-4 bg-gray-800 border border-gray-700 rounded-2xl px-6 py-4" placeholder="Product name">
        <textarea id="description" class="w-full mb-4 bg-gray-800 border border-gray-700 rounded-2xl px-6 py-4 h-32" placeholder="Description"></textarea>
        <div class="grid grid-cols-2 gap-4">
          <input id="price" type="number" step="0.01" required class="bg-gray-800 border border-gray-700 rounded-2xl px-6 py-4" placeholder="Price">
          <input id="stock" type="number" required class="bg-gray-800 border border-gray-700 rounded-2xl px-6 py-4" placeholder="Stock">
        </div>
        <div class="flex gap-4 mt-8">
          <button type="button" onclick="hideModal()" class="flex-1 py-4 bg-gray-800 rounded-2xl">Cancel</button>
          <button type="submit" class="flex-1 py-4 bg-emerald-500 rounded-2xl font-semibold">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let apiKey = '';
    const API = '/api/v1';

    window.onload = loadProducts;

    function loadProducts() {
      apiKey = document.getElementById('apiKey').value.trim();
      fetch(`${API}/products`)
        .then(r => r.json())
        .then(data => {
          let html = '';
          data.forEach(p => {
            html += `
              <div class="bg-gray-900 rounded-3xl p-6 border border-gray-800 hover:border-emerald-500 transition">
                <h3 class="text-xl font-semibold">${p.name}</h3>
                <p class="text-gray-400 my-3">${p.description || ''}</p>
                <div class="flex justify-between items-center">
                  <span class="text-emerald-400">$${p.price}</span>
                  <span class="text-sm">${p.stock_quantity} in stock</span>
                  <div>
                    <button onclick="editProduct(${p.id})" class="text-blue-400 mx-3">✏️</button>
                    <button onclick="deleteProduct(${p.id})" class="text-red-400">🗑️</button>
                  </div>
                </div>
              </div>`;
          });
          document.getElementById('productsGrid').innerHTML = html || '<p class="text-gray-400">No products yet</p>';
        });
    }

    function showCreateModal() {
      document.getElementById('modalTitle').innerText = 'New Product';
      document.getElementById('productForm').reset();
      document.getElementById('productId').value = '';
      document.getElementById('modal').classList.remove('hidden');
    }

    function hideModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    async function saveProduct(e) {
      e.preventDefault();
      const id = document.getElementById('productId').value;
      const payload = {
        name: document.getElementById('name').value,
        description: document.getElementById('description').value,
        price: parseFloat(document.getElementById('price').value),
        stock_quantity: parseInt(document.getElementById('stock').value)
      };

      const method = id ? 'PUT' : 'POST';
      const url = id ? `${API}/products/${id}` : `${API}/products`;

      await fetch(url, {
        method,
        headers: {'Content-Type': 'application/json', 'X-API-Key': apiKey},
        body: JSON.stringify(payload)
      });

      hideModal();
      loadProducts();
    }

    async function editProduct(id) {
      const res = await fetch(`${API}/products/${id}`);
      const p = await res.json();
      document.getElementById('modalTitle').innerText = 'Edit Product';
      document.getElementById('productId').value = p.id;
      document.getElementById('name').value = p.name;
      document.getElementById('description').value = p.description || '';
      document.getElementById('price').value = p.price;
      document.getElementById('stock').value = p.stock_quantity;
      document.getElementById('modal').classList.remove('hidden');
    }

    async function deleteProduct(id) {
      if (confirm('Delete?')) {
        await fetch(`${API}/products/${id}`, {method: 'DELETE', headers: {'X-API-Key': apiKey}});
        loadProducts();
      }
    }
  </script>
</body>
</html>
