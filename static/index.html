<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Catalog • Expert</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .toast { animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
    .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-gray-950 text-white">
  <div class="flex h-screen overflow-hidden">
    <div class="w-96 bg-gray-900 border-r border-gray-800 flex flex-col p-8">
      <div class="flex items-center gap-3 mb-10">
        <i class="fa-solid fa-boxes-stacked text-4xl text-emerald-500"></i>
        <h1 class="text-4xl font-bold tracking-tighter">Catalog</h1>
      </div>

      <div class="space-y-8">
        <div>
          <label class="text-xs uppercase tracking-widest text-gray-500 mb-2 block">X-API-KEY</label>
          <input id="apiKey" type="password" placeholder="Paste your X-API-Key" 
                 class="w-full bg-gray-800 border border-gray-700 rounded-3xl px-6 py-4 text-sm focus:border-emerald-500 focus:outline-none">
        </div>

        <div>
          <label class="text-xs uppercase tracking-widest text-gray-500 mb-2 block">Search Products</label>
          <div class="relative">
            <input id="searchInput" type="text" placeholder="Name or description..." 
                   class="w-full bg-gray-800 border border-gray-700 rounded-3xl px-6 py-4 pl-12 text-sm focus:border-emerald-500 focus:outline-none">
            <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-gray-500"></i>
          </div>
        </div>

        <div>
          <label class="text-xs uppercase tracking-widest text-gray-500 mb-3 block">Filters & Sort</label>
          <div class="space-y-5">
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="text-xs text-gray-400">Min Price</label>
                <input id="minPrice" type="number" placeholder="0" class="w-full mt-1 bg-gray-800 border border-gray-700 rounded-2xl px-4 py-3 text-sm">
              </div>
              <div>
                <label class="text-xs text-gray-400">Max Price</label>
                <input id="maxPrice" type="number" placeholder="999" class="w-full mt-1 bg-gray-800 border border-gray-700 rounded-2xl px-4 py-3 text-sm">
              </div>
            </div>
            <div class="flex items-center gap-3">
              <input id="inStockOnly" type="checkbox" class="w-5 h-5 accent-emerald-500">
              <label class="text-sm">In stock only</label>
            </div>
            <div>
              <label class="text-xs text-gray-400">Sort by</label>
              <select id="sortSelect" class="w-full mt-1 bg-gray-800 border border-gray-700 rounded-2xl px-4 py-3 text-sm">
                <option value="name-asc">Name A-Z</option>
                <option value="price-desc">Price High-Low</option>
              </select>
            </div>
          </div>
        </div>

        <button onclick="loadProducts()" 
                class="w-full bg-emerald-600 hover:bg-emerald-700 py-4 rounded-3xl font-semibold flex items-center justify-center gap-2 transition">
          <i class="fa-solid fa-rotate"></i> Refresh from Server
        </button>
      </div>
    </div>

    <div class="flex-1 flex flex-col">
      <div class="bg-gray-900 px-10 py-6 border-b border-gray-800 flex items-center justify-between">
        <div>
          <h2 class="text-3xl font-semibold">All Products</h2>
          <p id="countText" class="text-gray-400 text-sm">0 products</p>
        </div>
        <button onclick="showCreateModal()" 
                class="bg-emerald-500 hover:bg-emerald-600 px-8 py-4 rounded-3xl flex items-center gap-3 font-medium transition">
          <i class="fa-solid fa-plus"></i> New Product
        </button>
      </div>

      <div id="productsGrid" class="flex-1 p-10 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 overflow-auto"></div>

      <div id="pagination" class="bg-gray-900 border-t border-gray-800 px-10 py-5 flex justify-between items-center text-sm"></div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-gray-900 rounded-3xl w-full max-w-md p-8">
      <h3 id="modalTitle" class="text-2xl font-bold mb-6">New Product</h3>
      <form id="productForm" onsubmit="saveProduct(event)">
        <input id="productId" type="hidden">
        <input id="name" required placeholder="Product name" class="w-full mb-4 bg-gray-800 border border-gray-700 rounded-2xl px-6 py-4">
        <textarea id="description" placeholder="Description" class="w-full mb-4 bg-gray-800 border border-gray-700 rounded-2xl px-6 py-4 h-28"></textarea>
        <div class="grid grid-cols-2 gap-4">
          <input id="price" type="number" step="0.01" required placeholder="Price" class="bg-gray-800 border border-gray-700 rounded-2xl px-6 py-4">
          <input id="stock" type="number" required placeholder="Stock" class="bg-gray-800 border border-gray-700 rounded-2xl px-6 py-4">
        </div>
        <div class="flex gap-4 mt-8">
          <button type="button" onclick="hideModal()" class="flex-1 py-4 bg-gray-800 hover:bg-gray-700 rounded-2xl">Cancel</button>
          <button type="submit" id="saveBtn" class="flex-1 py-4 bg-emerald-500 hover:bg-emerald-600 rounded-2xl font-semibold">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div id="toastContainer" class="fixed top-6 right-6 z-50 flex flex-col gap-3"></div>

  <script>
    const API = '/api/v1';
    let allProducts = [];

    function getApiKey() {
      const key = document.getElementById('apiKey').value.trim();
      if (!key) {
        showToast('❌ Please enter your X-API-Key', 'error');
        return null;
      }
      return key;
    }

    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast flex items-center gap-3 px-6 py-4 rounded-3xl shadow-2xl text-sm font-medium ${type === 'success' ? 'bg-emerald-600' : 'bg-red-600'}`;
      toast.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-check-circle' : 'fa-xmark-circle'}"></i><span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 4500);
    }

    async function loadProducts() {
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = `<div class="col-span-full flex justify-center py-20"><i class="fa-solid fa-spinner fa-spin text-4xl text-emerald-500"></i></div>`;

      try {
        const res = await fetch(`${API}/products`);
        if (!res.ok) throw new Error('API error');
        allProducts = await res.json();
        renderProducts();
        showToast('✅ Products loaded successfully', 'success');
      } catch (err) {
        grid.innerHTML = `<p class="col-span-full text-red-400 text-center py-12">Failed to load products. Check your X-API-Key and try again.</p>`;
        showToast('❌ Failed to load products', 'error');
      }
    }

    function renderProducts() {
      let filtered = allProducts.filter(p => {
        const search = document.getElementById('searchInput').value.toLowerCase().trim();
        const minP = parseFloat(document.getElementById('minPrice').value) || 0;
        const maxP = parseFloat(document.getElementById('maxPrice').value) || Infinity;
        const stockOnly = document.getElementById('inStockOnly').checked;
        return (!search || p.name.toLowerCase().includes(search) || (p.description && p.description.toLowerCase().includes(search))) &&
               p.price >= minP && p.price <= maxP &&
               (!stockOnly || p.stock_quantity > 0);
      });

      const sort = document.getElementById('sortSelect').value;
      if (sort === 'price-desc') filtered.sort((a,b) => b.price - a.price);
      else filtered.sort((a,b) => a.name.localeCompare(b.name));

      document.getElementById('countText').textContent = `${filtered.length} products`;

      let html = '';
      if (filtered.length === 0) {
        html = `<div class="col-span-full text-center py-20"><i class="fa-solid fa-box-open text-6xl text-gray-600"></i><p class="text-xl text-gray-400 mt-4">No products found</p></div>`;
      } else {
        filtered.forEach(p => {
          html += `
            <div class="product-card bg-gray-900 border border-gray-800 rounded-3xl p-6">
              <img src="https://picsum.photos/id/${p.id}/600/300" class="w-full h-48 object-cover rounded-2xl">
              <h3 class="font-semibold text-xl mt-4">${p.name}</h3>
              <p class="text-gray-400 text-sm mt-2">${p.description || ''}</p>
              <div class="flex justify-between mt-6">
                <span class="text-3xl font-bold text-emerald-400">$${p.price}</span>
                <span class="text-sm ${p.stock_quantity < 10 ? 'text-red-400' : 'text-emerald-400'}">${p.stock_quantity} in stock</span>
              </div>
              <div class="mt-6 flex gap-3">
                <button onclick="editProduct(${p.id})" class="flex-1 py-3 bg-blue-600 hover:bg-blue-700 rounded-2xl">Edit</button>
                <button onclick="deleteProduct(${p.id})" class="flex-1 py-3 bg-red-600 hover:bg-red-700 rounded-2xl">Delete</button>
              </div>
            </div>`;
        });
      }
      document.getElementById('productsGrid').innerHTML = html;
    }

    function showCreateModal() {
      document.getElementById('modalTitle').textContent = 'New Product';
      document.getElementById('productForm').reset();
      document.getElementById('productId').value = '';
      document.getElementById('modal').classList.remove('hidden');
    }

    function hideModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    async function saveProduct(e) {
      e.preventDefault();
      const apiKey = getApiKey();
      if (!apiKey) return;

      const id = document.getElementById('productId').value;
      const payload = {
        name: document.getElementById('name').value,
        description: document.getElementById('description').value,
        price: parseFloat(document.getElementById('price').value),
        stock_quantity: parseInt(document.getElementById('stock').value)
      };

      const method = id ? 'PUT' : 'POST';
      const url = id ? `${API}/products/${id}` : `${API}/products`;

      try {
        const res = await fetch(url, {
          method,
          headers: {'Content-Type': 'application/json', 'X-API-Key': apiKey},
          body: JSON.stringify(payload)
        });
        if (res.ok) {
          hideModal();
          loadProducts();
          showToast('✅ Saved successfully', 'success');
        } else {
          showToast('❌ Save failed', 'error');
        }
      } catch (err) {
        showToast('❌ Network error', 'error');
      }
    }

    async function editProduct(id) {
      try {
        const res = await fetch(`${API}/products/${id}`);
        const p = await res.json();
        document.getElementById('modalTitle').textContent = 'Edit Product';
        document.getElementById('productId').value = p.id;
        document.getElementById('name').value = p.name;
        document.getElementById('description').value = p.description || '';
        document.getElementById('price').value = p.price;
        document.getElementById('stock').value = p.stock_quantity;
        document.getElementById('modal').classList.remove('hidden');
      } catch (err) {
        showToast('❌ Failed to load', 'error');
      }
    }

    async function deleteProduct(id) {
      if (!confirm('Delete permanently?')) return;
      const apiKey = getApiKey();
      if (!apiKey) return;
      try {
        await fetch(`${API}/products/${id}`, { method: 'DELETE', headers: {'X-API-Key': apiKey} });
        loadProducts();
        showToast('✅ Deleted', 'success');
      } catch (err) {
        showToast('❌ Delete failed', 'error');
      }
    }

    // Simple listeners
    document.getElementById('searchInput').addEventListener('input', () => setTimeout(renderProducts, 300));
    document.getElementById('minPrice').addEventListener('input', renderProducts);
    document.getElementById('maxPrice').addEventListener('input', renderProducts);
    document.getElementById('inStockOnly').addEventListener('change', renderProducts);
    document.getElementById('sortSelect').addEventListener('change', renderProducts);

    window.onload = loadProducts;
  </script>
</body>
</html>
