<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalog CRUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-8">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-blue-600">Product Catalog Manager</h1>
        
        <div class="bg-white p-4 rounded shadow mb-6">
            <label class="block text-sm font-medium mb-1">API Key (Required for CRUD)</label>
            <input type="password" id="apiKey" class="border p-2 rounded w-full md:w-1/2" placeholder="Enter your API Key...">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded shadow col-span-1">
                <h2 class="text-xl font-semibold mb-4" id="formTitle">Add New Product</h2>
                <form id="productForm">
                    <input type="hidden" id="productId">
                    <div class="mb-4">
                        <label class="block text-sm font-medium mb-1">Name</label>
                        <input type="text" id="name" required class="border p-2 rounded w-full">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium mb-1">Description</label>
                        <textarea id="description" class="border p-2 rounded w-full"></textarea>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium mb-1">Price ($)</label>
                        <input type="number" step="0.01" id="price" required class="border p-2 rounded w-full">
                    </div>
                    <div class="flex gap-2">
                        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 w-full">Save</button>
                        <button type="button" onclick="resetForm()" class="bg-gray-400 text-white px-4 py-2 rounded hover:bg-gray-500 w-full hidden" id="cancelBtn">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="bg-white p-6 rounded shadow col-span-1 md:col-span-2">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold">Products</h2>
                    <button onclick="fetchProducts()" class="text-sm bg-green-500 text-white px-3 py-1 rounded hover:bg-green-600">Refresh</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b">
                                <th class="p-2">ID</th>
                                <th class="p-2">Name</th>
                                <th class="p-2">Price</th>
                                <th class="p-2">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="productList">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/products'; // Adjust if your endpoints are prefixed like /api/products
        
        function getHeaders() {
            return {
                'Content-Type': 'application/json',
                'X-API-Key': document.getElementById('apiKey').value // Assumes X-API-Key header
            };
        }

        async function fetchProducts() {
            try {
                const res = await fetch(API_URL);
                const products = await res.json();
                const tbody = document.getElementById('productList');
                tbody.innerHTML = '';
                
                products.forEach(p => {
                    tbody.innerHTML += `
                        <tr class="border-b hover:bg-gray-50">
                            <td class="p-2">${p.id}</td>
                            <td class="p-2 font-medium">${p.name}</td>
                            <td class="p-2">$${p.price}</td>
                            <td class="p-2">
                                <button onclick="editProduct(${p.id}, '${p.name}', '${p.description || ''}', ${p.price})" class="text-blue-500 hover:underline mr-2">Edit</button>
                                <button onclick="deleteProduct(${p.id})" class="text-red-500 hover:underline">Delete</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error('Error fetching products:', error);
                alert("Failed to load products. Check console or backend URL.");
            }
        }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('productId').value;
            const data = {
                name: document.getElementById('name').value,
                description: document.getElementById('description').value,
                price: parseFloat(document.getElementById('price').value)
            };

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: getHeaders(),
                    body: JSON.stringify(data)
                });
                
                if(res.ok) {
                    resetForm();
                    fetchProducts();
                } else {
                    const errorData = await res.json();
                    alert(`Error: ${errorData.detail || 'Unauthorized or Bad Request'}`);
                }
            } catch (error) {
                console.error('Save error:', error);
            }
        });

        function editProduct(id, name, desc, price) {
            document.getElementById('formTitle').innerText = 'Edit Product';
            document.getElementById('productId').value = id;
            document.getElementById('name').value = name;
            document.getElementById('description').value = desc;
            document.getElementById('price').value = price;
            document.getElementById('cancelBtn').classList.remove('hidden');
        }

        async function deleteProduct(id) {
            if(!confirm('Delete this product?')) return;
            try {
                const res = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE',
                    headers: getHeaders()
                });
                if(res.ok) fetchProducts();
                else alert('Error deleting product (Check API Key)');
            } catch (error) {
                console.error('Delete error:', error);
            }
        }

        function resetForm() {
            document.getElementById('formTitle').innerText = 'Add New Product';
            document.getElementById('productId').value = '';
            document.getElementById('productForm').reset();
            document.getElementById('cancelBtn').classList.add('hidden');
        }

        // Initial load
        fetchProducts();
    </script>
</body>
</html>
